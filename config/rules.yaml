    - 'domestic ecosystem'
    - 'conservative AI'
    - 'medical AI'
    - 'research report'
    - 'strategic report'
    - 'analytical report'

  # Context-dependent indicators - only reject if found without invoice context
  context_negative_indicators:
    narozen:
      - 'rodné číslo'
      - 'datum narození'
      - 'narozen v'
      # EN equivalents (DOPLNĚNO)
      - 'social security number'
      - 'birth certificate number'
