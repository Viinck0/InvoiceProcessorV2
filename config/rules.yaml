  # Regex patterns for title detection (non-invoice documents)
  title_patterns:
    - rf'^.*{indicator}.*$'
    - rf'\n.*{indicator}.*\n'
    - rf'{indicator}\s*č\.'
    - rf'{indicator}\s*#'

