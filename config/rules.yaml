      - 'payment for'
    licence:
      - 'fakturujeme za'
      - 'faktura za'
      - 'úhrada za'
      - 'platba za'
    license:
      - 'we invoice for'
      - 'invoice for'
      - 'payment for'
    objednávka:
      - 'faktura za'
      - 'úhrada za'
      - 'platba za'
      - 'fakturujeme za'
      - 'daňový doklad'
      - 'číslo objednávky' # OPRAVENO: Přidán běžný kontext
