    # Legal/Financial documents - CZ
    - 'plná moc'
    - 'plnomocenství'
    - 'dluhopis'
    - 'cenný papír'
    - 'akcie'
    - 'kmenový list'
    - 'směnka'
    # Legal/Financial documents - EN (DOPLNĚNO)
    - 'power of attorney'
    - 'bond'
    - 'debenture'
    - 'security'
    - 'securities'
    - 'share'
    - 'stock'
    - 'share certificate'
    - 'promissory note'
    - 'bill of exchange'
    # CV/Resume - CZ
    - 'životopis'
    - 'životopisy'
    - 'curriculum vitae'
    - 'curriculum'
    - 'resume'
    - 'pracovní zkušenosti'
    - 'vzdělání'
    - 'dovednosti'
    - 'jazykové znalosti'
    # CV/Resume - EN (DOPLNĚNO)
    - 'language skills'
    - 'language knowledge'
    - 'work experience'
    - 'education'
    - 'skills'
    - 'professional profile'
    - 'professional summary'
    - 'career objective'
    - 'core competencies'
    - 'technical competencies'
    - 'technical projects'
    - 'professional working proficiency'
    # Certificates - CZ
    - 'certifikát o absolvování'
    - 'diplom'
    - 'osvědčení o absolvování'
    # Certificates - EN (DOPLNĚNO)
    - 'certificate of completion'
    - 'diploma'
    # Research reports - CZ
    - 'mapování terénu'
    - 'strategický pitch'
    - 'průzkum českého'
    - 'výzkumných skupin'
    - 'pracovišť'
    - 'český AI ekosystém'
    - 'mapa české ai'
    - 'tuzemského ekosystému'
