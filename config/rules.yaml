      - 'faktura'
      - 'dle schváleného'
      - 'na základě'
      # EN equivalents (DOPLNĚNO)
      - 'per approved'
      - 'based on'
    offer:
      - 'we invoice'
      - 'invoice'
      - 'per approved'
      - 'based on'

  # Fallback classification keywords (when AI fails)
  fallback:
    positive_keywords:
      - 'faktura'
      - 'daňový doklad'
      - 'celkem k úhradě'
      - 'invoice'
      - 'tax document'
      - 'total amount'
      - 'total due'
