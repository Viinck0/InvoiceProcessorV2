      - 'reminder'
      - 'contract'
      - 'offer'
      - 'quotation'
      - 'curriculum vitae'
      - 'resume'
      - 'certificate'
      - 'power of attorney'
      - 'bond'
      - 'security'
      - 'share'
      - 'stock'
      - 'license'
      - 'graduated'
      - 'completed'
      - 'course'
