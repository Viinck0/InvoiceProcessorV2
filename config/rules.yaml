# =============================================================================
# EXTRACTOR AGENT - Data Extraction Patterns
# =============================================================================

extractor_agent:
  # Regex patterns for data extraction
  patterns:
    date: r'(\d{1,2})[./-](\d{1,2})[./-](\d{4})'
    amount: r'(\d{1,3}(?:[\s\.,]\d{3})*(?:[\s\.,]\d{1,2})?)'
    ico: r'(?:ičo|ič|reg\.?\s*no\.?|company\s*no\.?|crn)\s*[:.]?\s*(\d{6,10})'
    dic: r'(?:dič|vat\s*id|tax\s*id|vat\s*no\.?)\s*[:.]?\s*([a-zA-Z]{2}\d{8,12})'
    account: r'(cz|sk)?\d{4,6}[- ]?\d{6,10}[- ]?\d{2,4}'
    iban: r'iban:\s*([a-z]{2}\d{2,24})'

  # Amount extraction patterns (super-regex)
  amount_patterns:
    - '(?:celkem\s*k\s*úhradě|celkemkuhrade|celkem|total|grand\s*total|amount\s*due|k\s*úhradě|k\s*zaplacení|částka\s*:)[\s]*(\d+(?:[\s,.]\d+)*)(?:\s*(Kč|EUR|USD|CZK|GBP|€|\$|£))?'
    - r'(\d{1,3}(?:[\s,.]\d{3})*(?:,\d+)?)\s*(Kč|EUR|USD|CZK|GBP|€|\$|£)'

  # Date extraction patterns
  date_patterns:
    - r'(\d{1,2})[./-](\d{1,2})[./-](\d{4})'
    - r'(\d{4})[./-](\d{1,2})[./-](\d{1,2})'
    - r'(\d{1,2})\.\s*(\w+)\s*(\d{4})'
    - r'(\w+)\s+(\d{1,2}),?\s+(\d{4})'

  # Currency symbols and codes
  currencies:
    symbols: ['Kč', '€', '$', '£']
    codes: ['CZK', 'EUR', 'USD', 'GBP', 'PLN', 'HUF']

