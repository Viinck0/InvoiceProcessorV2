# Invoice Processing Rules Configuration
# ======================================
# This file contains all keywords, patterns, and regex rules for invoice processing.
# Edit this file to tune accuracy without modifying Python code.
#
# Syntax:
#   - keywords: list of strings (case-insensitive matching)
#   - patterns: list of regex patterns
#   - threshold: minimum number of keywords to trigger a rule
#   - veto: if true, this rule can reject a document regardless of other scores

# =============================================================================
# CLASSIFIER AGENT - Document Type Classification
# =============================================================================

classifier:
  # Strong negative indicators - immediate rejection if found
  # OPRAVENO: Odstraněny výrazy pro nabídky, rozpočty a upomínky, aby nedocházelo k falešným zamítnutím.
