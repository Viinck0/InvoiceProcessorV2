# =============================================================================
# OCR VALIDATOR - Text Quality Patterns
# =============================================================================

ocr_validator:
  # Patterns that indicate OCR hallucinations
  hallucination_patterns:
    - r'^[aeiouyAEIOUY]{5,}$'  # Too many vowels
    - r'^[^aeiouyAEIOUY\s]{5,}$'  # Too many consonants
    - r'^[a-zA-Z]{1,2}$'  # Too short (1-2 chars)
    - r'(.)\1{4,}'  # Repeated characters (aaaaa)
    - r'^[0-9]+$'  # Pure numbers (likely page numbers)

  # Valid word patterns (skip spell check)
  valid_word_patterns:
    - r'^\d{1,2}\.\d{1,2}\.\d{4}$'  # Date format
    - r'^\d+[,.]\d{2}$'  # Numbers with decimals
    - r'^[A-Z][a-z]+-[A-Z][a-z]+$'  # Compound words
    - r'^\d+[a-z]$'  # Section markers (1a, 2b)
    - r'^[IVXLC]+\.$'  # Roman numerals

  # Long pattern corrections (OCR error fixes)
  long_pattern_corrections:
    - wrong: 'celkemkuhrade'
      right: 'celkem k úhradě'
    - wrong: 'celkemkúhradě'
      right: 'celkem k úhradě'
    - wrong: 'dodavatelodběratel'
      right: 'dodavatel odběratel'
    - wrong: 'ičo:'
      right: 'IČO:'

